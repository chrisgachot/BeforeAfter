<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Before & After">
<meta name="theme-color" content="#0f0f0f">
<title>Before & After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: #0f0f0f; }
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .panel { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #1a1a1a; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .panel--before { border-bottom: 1px solid #000; }
  .label { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; pointer-events: none; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .panel--before .label { background: rgba(232,93,58,0.18); color: #e85d3a; border: 1px solid rgba(232,93,58,0.25); }
  .panel--after .label { background: rgba(58,184,138,0.18); color: #3ab88a; border: 1px solid rgba(58,184,138,0.25); }
  .label-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .panel--before .label-dot { background: #e85d3a; }
  .panel--after .label-dot { background: #3ab88a; }
  .empty { display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; user-select: none; opacity: 0.25; }
  .empty svg { width: 36px; height: 36px; }
  .empty-text { font-size: 11px; color: #fff; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }
  .panel input[type="file"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }
  .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .preview-img.visible { display: block; }
  .tap-change { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 4px; display: none; pointer-events: none; z-index: 10; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .preview-img.visible ~ .tap-change { display: block; }
</style>
</head>
<body>
  <div class="panel panel--before">
    <div class="label"><span class="label-dot"></span>Before</div>
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <img class="preview-img" id="preview-before" alt="Before">
    <span class="tap-change">tap to change</span>
    <input type="file" accept="image/*" id="input-before">
  </div>
  <div class="panel panel--after">
    <div class="label"><span class="label-dot"></span>After</div>
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <img class="preview-img" id="preview-after" alt="After">
    <span class="tap-change">tap to change</span>
    <input type="file" accept="image/*" id="input-after">
  </div>
<script>
  function setupUpload(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.classList.add('visible');
    });
  }
  setupUpload('input-before', 'preview-before');
  setupUpload('input-after', 'preview-after');
</script>
</body>
</html>
