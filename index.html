<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Before & After">
<meta name="theme-color" content="#0f0f0f">
<title>Before & After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Prevent the browser from ever pinch-zooming the page itself */
  html, body {
    width: 100%; height: 100%; height: 100dvh;
    overflow: hidden;
    background: #0f0f0f;
    touch-action: none;   /* page-level pinch zoom disabled */
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Toolbar ── */
  #toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 6px;
    background: #0f0f0f;
    gap: 6px;
    touch-action: manipulation;
  }
  #toolbar-left, #toolbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
  }
  .toggle-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .toggle-btn.active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* ── Icon-only toolbar buttons ── */
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .icon-btn svg { width: 14px; height: 14px; }
  .icon-btn:active, .icon-btn.active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* ── Hide controls mode ── */
  body.ui-hidden .zoom-controls,
  body.ui-hidden .crop-btn-wrap { display: none !important; }

  /* ── Container ── */
  #photo-container {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #photo-container.layout-stacked { flex-direction: column; }
  #photo-container.layout-side    { flex-direction: row; }

  /* ── Panel ── */
  .panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
    min-width: 0;
    min-height: 0;
  }
  .layout-stacked .panel--before { border-bottom: 1px solid #000; }
  .layout-side    .panel--before { border-right:  1px solid #000; }

  /* ── Label ── */
  .label {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 20;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    pointer-events: none;
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .panel--before .label { background: #e85d3a; color: #fff; }
  .panel--after  .label { background: #3ab88a; color: #fff; }
  .layout-side .label { font-size: 9px; padding: 4px 8px; letter-spacing: 0.10em; }

  /* ── Zoom controls ── */
  .zoom-controls {
    position: absolute;
    bottom: 10px; right: 10px;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-controls.visible { display: flex; }
  .zoom-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 18px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'DM Mono', monospace;
    touch-action: manipulation;
  }
  .zoom-btn:active { background: rgba(255,255,255,0.15); }

  /* ── Crop button (bottom-left) ── */
  .crop-btn-wrap {
    position: absolute;
    bottom: 10px; left: 10px;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .crop-btn-wrap.visible { display: flex; }
  .crop-btn {
    height: 30px;
    padding: 0 10px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .crop-btn:active { background: rgba(255,255,255,0.15); }
  .crop-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* ── Crop overlay ── */
  .crop-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    display: none;
  }
  .crop-overlay.active { display: block; }
  .crop-box {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.85);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    pointer-events: none;
  }
  .crop-handle {
    position: absolute;
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 4px;
    pointer-events: all;
    touch-action: none;
  }
  .crop-handle.tl { top: -3px; left: -3px; cursor: nwse-resize; }
  .crop-handle.tr { top: -3px; right: -3px; cursor: nesw-resize; }
  .crop-handle.bl { bottom: -3px; left: -3px; cursor: nesw-resize; }
  .crop-handle.br { bottom: -3px; right: -3px; cursor: nwse-resize; }

  /* ── Crop toolbar ── */
  .crop-toolbar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    display: none;
    gap: 6px;
  }
  .crop-toolbar.active { display: flex; }
  .ct-btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 20px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .ct-btn.cancel { background: rgba(255,255,255,0.12); color: #aaa; }
  .ct-btn.apply  { background: #fff; color: #000; font-weight: 600; }
  .ct-btn:active { opacity: 0.75; }

  /* ── Empty state ── */
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0.22;
  }
  .empty svg { width: 34px; height: 34px; }
  .empty-text { font-size: 11px; color: #fff; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }

  /* ── Upload trigger ── */
  .upload-trigger {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .upload-trigger input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
  }
  .upload-trigger.hidden { display: none; }

  /* ── Zoomable image wrapper ── */
  .zoom-wrapper {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: none;
    touch-action: none; /* all gestures handled in JS */
  }
  .zoom-wrapper.visible { display: block; }
  .zoom-wrapper img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform-origin: 0 0;
    will-change: transform;
    pointer-events: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div id="toolbar-left">
    <button class="toggle-btn" id="btn-stacked" onclick="setLayout('stacked')">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="11" height="5" rx="1"/>
        <rect x="1" y="7" width="11" height="5" rx="1"/>
      </svg>
      Top / Bottom
    </button>
    <button class="toggle-btn active" id="btn-side" onclick="setLayout('side')">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="5" height="11" rx="1"/>
        <rect x="7" y="1" width="5" height="11" rx="1"/>
      </svg>
      Side by Side
    </button>
  </div>
  <div id="toolbar-right">
    <!-- Hide/show panel controls -->
    <button class="icon-btn" id="btn-hideui" onclick="toggleUI()" title="Hide controls">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
        <circle cx="8" cy="8" r="2"/>
      </svg>
    </button>
    <!-- Download combined image -->
    <button class="icon-btn" id="btn-download" onclick="downloadComparison()" title="Download comparison">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2v8M5 7l3 3 3-3"/>
        <path d="M2 12h12" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<div id="photo-container" class="layout-side">

  <!-- BEFORE -->
  <div class="panel panel--before" id="panel-before">
    <div class="label">Before</div>
    <div class="empty" id="empty-before">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-before">
      <input type="file" accept="image/*" id="input-before">
    </div>
    <div class="zoom-wrapper" id="zoom-before">
      <img id="img-before" alt="Before">
    </div>
    <div class="zoom-controls" id="zc-before">
      <button class="zoom-btn" onclick="zoomStep('before', 0.3)">+</button>
      <button class="zoom-btn" onclick="zoomStep('before', -0.3)">−</button>
      <button class="zoom-btn" style="font-size:13px" onclick="zoomReset('before')">↺</button>
    </div>
    <div class="crop-btn-wrap" id="cb-before">
      <button class="crop-btn" onclick="enterCropMode('before')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M3 1v8h8M1 3h8v8"/>
        </svg>
        Crop
      </button>
    </div>
    <div class="crop-overlay" id="co-before">
      <div class="crop-box" id="cbox-before">
        <div class="crop-handle tl" data-corner="tl" data-panel="before"></div>
        <div class="crop-handle tr" data-corner="tr" data-panel="before"></div>
        <div class="crop-handle bl" data-corner="bl" data-panel="before"></div>
        <div class="crop-handle br" data-corner="br" data-panel="before"></div>
      </div>
    </div>
    <div class="crop-toolbar" id="ct-before">
      <button class="ct-btn cancel" onclick="exitCropMode('before')">Cancel</button>
      <button class="ct-btn apply"  onclick="applyCrop('before')">Apply Crop</button>
    </div>
  </div>

  <!-- AFTER -->
  <div class="panel panel--after" id="panel-after">
    <div class="label">After</div>
    <div class="empty" id="empty-after">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-after">
      <input type="file" accept="image/*" id="input-after">
    </div>
    <div class="zoom-wrapper" id="zoom-after">
      <img id="img-after" alt="After">
    </div>
    <div class="zoom-controls" id="zc-after">
      <button class="zoom-btn" onclick="zoomStep('after', 0.3)">+</button>
      <button class="zoom-btn" onclick="zoomStep('after', -0.3)">−</button>
      <button class="zoom-btn" style="font-size:13px" onclick="zoomReset('after')">↺</button>
    </div>
    <div class="crop-btn-wrap" id="cb-after">
      <button class="crop-btn" onclick="enterCropMode('after')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M3 1v8h8M1 3h8v8"/>
        </svg>
        Crop
      </button>
    </div>
    <div class="crop-overlay" id="co-after">
      <div class="crop-box" id="cbox-after">
        <div class="crop-handle tl" data-corner="tl" data-panel="after"></div>
        <div class="crop-handle tr" data-corner="tr" data-panel="after"></div>
        <div class="crop-handle bl" data-corner="bl" data-panel="after"></div>
        <div class="crop-handle br" data-corner="br" data-panel="after"></div>
      </div>
    </div>
    <div class="crop-toolbar" id="ct-after">
      <button class="ct-btn cancel" onclick="exitCropMode('after')">Cancel</button>
      <button class="ct-btn apply"  onclick="applyCrop('after')">Apply Crop</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// PREVENT BROWSER-LEVEL ZOOM  (comprehensive)
// ═══════════════════════════════════════════════════

// 1. Safari: proprietary gesture events
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });

// 2. All browsers: block ALL touchmove at document level.
//    This is the most reliable way to stop page zoom on Android Chrome,
//    which ignores user-scalable=no since Chrome 55.
//    Our in-element touchmove handlers still fire first (bubble order),
//    so zoom/pan inside the panels is unaffected.
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// 3. Block multi-touch touchstart at document level (extra safety for iOS)
document.addEventListener('touchstart', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// 4. Prevent double-tap zoom
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });

// 5. Desktop: block ctrl+scroll page zoom
document.addEventListener('wheel', e => {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });

// ═══════════════════════════════════════════════════
// ZOOM STATE  (always read via state[id], never cache reference)
// ═══════════════════════════════════════════════════

const state = {
  before: { scale: 1, tx: 0, ty: 0 },
  after:  { scale: 1, tx: 0, ty: 0 }
};

function applyTransform(id) {
  const { scale, tx, ty } = state[id];
  document.getElementById('img-' + id).style.transform =
    `translate(${tx}px,${ty}px) scale(${scale})`;
}

function clampState(id) {
  const s = state[id];
  const wrapper = document.getElementById('zoom-' + id);
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  s.tx = Math.min(0, Math.max(w  - w  * s.scale, s.tx));
  s.ty = Math.min(0, Math.max(h  - h  * s.scale, s.ty));
}

// Zoom toward a panel-space point (px, py)
function zoomToward(id, px, py, newScale) {
  const s = state[id];
  newScale = Math.max(1, Math.min(8, newScale));
  const ratio = newScale / s.scale;
  s.tx = px - ratio * (px - s.tx);
  s.ty = py - ratio * (py - s.ty);
  s.scale = newScale;
  clampState(id);
  applyTransform(id);
}

function zoomStep(id, delta) {
  const wrapper = document.getElementById('zoom-' + id);
  const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
  zoomToward(id, cx, cy, state[id].scale + delta);
}

function zoomReset(id) {
  state[id] = { scale: 1, tx: 0, ty: 0 };
  applyTransform(id);
}

// ═══════════════════════════════════════════════════
// PINCH-TO-ZOOM + PAN  (Touch Events — most reliable on mobile)
// ═══════════════════════════════════════════════════

function attachZoom(id) {
  const wrapper = document.getElementById('zoom-' + id);

  // Track previous gesture state in panel-relative coords
  let lastMidX = null, lastMidY = null, lastDist = null;

  function readTouches(e) {
    // Always use e.touches (all current touches), not changedTouches
    const rect = wrapper.getBoundingClientRect();
    const ts = Array.from(e.touches);
    return { ts, rect };
  }

  // ── touchstart: snapshot starting position ──
  wrapper.addEventListener('touchstart', e => {
    e.preventDefault();
    const { ts, rect } = readTouches(e);
    if (ts.length >= 2) {
      lastMidX = (ts[0].clientX + ts[1].clientX) / 2 - rect.left;
      lastMidY = (ts[0].clientY + ts[1].clientY) / 2 - rect.top;
      lastDist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);
    } else {
      lastMidX = ts[0].clientX - rect.left;
      lastMidY = ts[0].clientY - rect.top;
      lastDist = null;
    }
  }, { passive: false });

  // ── touchmove: pan + pinch ──
  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const { ts, rect } = readTouches(e);
    const s = state[id];

    if (ts.length >= 2) {
      // ── Two fingers: pinch-zoom + pan simultaneously ──
      const midX = (ts[0].clientX + ts[1].clientX) / 2 - rect.left;
      const midY = (ts[0].clientY + ts[1].clientY) / 2 - rect.top;
      const dist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);

      if (lastDist !== null && lastMidX !== null) {
        // Scale toward pinch midpoint
        const ratio    = dist / lastDist;
        const newScale = Math.max(1, Math.min(8, s.scale * ratio));
        const ar       = newScale / s.scale;
        s.tx = midX - ar * (midX - s.tx);
        s.ty = midY - ar * (midY - s.ty);
        s.scale = newScale;
        // Pan by midpoint movement (after scaling)
        s.tx += midX - lastMidX;
        s.ty += midY - lastMidY;
      }

      lastMidX = midX; lastMidY = midY; lastDist = dist;

    } else if (ts.length === 1) {
      // ── One finger: pan (works at any zoom level; clamp prevents over-scroll at 1×) ──
      const cx = ts[0].clientX - rect.left;
      const cy = ts[0].clientY - rect.top;
      if (lastMidX !== null) {
        s.tx += cx - lastMidX;
        s.ty += cy - lastMidY;
      }
      lastMidX = cx; lastMidY = cy; lastDist = null;
    }

    clampState(id);
    applyTransform(id);
  }, { passive: false });

  // ── touchend: transition cleanly between finger counts ──
  wrapper.addEventListener('touchend', e => {
    const { ts, rect } = readTouches(e);
    if (ts.length === 0) {
      lastMidX = null; lastMidY = null; lastDist = null;
    } else if (ts.length === 1) {
      // One finger remains after lifting the other — reset reference point
      // so the first move event doesn't cause a jump
      lastMidX = ts[0].clientX - rect.left;
      lastMidY = ts[0].clientY - rect.top;
      lastDist = null;
    }
  }, { passive: false });

  wrapper.addEventListener('touchcancel', () => {
    lastMidX = null; lastMidY = null; lastDist = null;
  }, { passive: false });

  // ── Mouse drag (desktop pan) ──
  let mouseDragging = false, mousePrevX, mousePrevY;
  wrapper.addEventListener('mousedown', e => {
    mouseDragging = true; mousePrevX = e.clientX; mousePrevY = e.clientY;
    e.preventDefault();
  });
  wrapper.addEventListener('mousemove', e => {
    if (!mouseDragging) return;
    const s = state[id];
    s.tx += e.clientX - mousePrevX;
    s.ty += e.clientY - mousePrevY;
    mousePrevX = e.clientX; mousePrevY = e.clientY;
    clampState(id); applyTransform(id);
  });
  window.addEventListener('mouseup', () => { mouseDragging = false; });

  // ── Mouse-wheel zoom (desktop) ──
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const rect  = wrapper.getBoundingClientRect();
    zoomToward(id, e.clientX - rect.left, e.clientY - rect.top,
               state[id].scale + (e.deltaY > 0 ? -0.15 : 0.15));
  }, { passive: false });
}

// ═══════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════

function setupUpload(id) {
  document.getElementById('input-' + id).addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const img = document.getElementById('img-' + id);
    img.src = URL.createObjectURL(file);
    document.getElementById('zoom-' + id).classList.add('visible');
    document.getElementById('zc-' + id).classList.add('visible');
    document.getElementById('cb-' + id).classList.add('visible');
    document.getElementById('empty-' + id).style.display = 'none';
    document.getElementById('trigger-' + id).classList.add('hidden');
    zoomReset(id);
  });
}

setupUpload('before'); setupUpload('after');
attachZoom('before');  attachZoom('after');

// ═══════════════════════════════════════════════════
// CROP MODE
// ═══════════════════════════════════════════════════

// Crop box position as fractions of panel size [0..1]
const cropState = {
  before: { x: 0.1, y: 0.1, w: 0.8, h: 0.8 },
  after:  { x: 0.1, y: 0.1, w: 0.8, h: 0.8 }
};

function updateCropBox(id) {
  const panel = document.getElementById('panel-' + id);
  const box   = document.getElementById('cbox-' + id);
  const c = cropState[id];
  const pw = panel.clientWidth, ph = panel.clientHeight;
  box.style.left   = (c.x * pw) + 'px';
  box.style.top    = (c.y * ph) + 'px';
  box.style.width  = (c.w * pw) + 'px';
  box.style.height = (c.h * ph) + 'px';
}

function enterCropMode(id) {
  cropState[id] = { x: 0.1, y: 0.1, w: 0.8, h: 0.8 };
  updateCropBox(id);
  document.getElementById('co-' + id).classList.add('active');
  document.getElementById('ct-' + id).classList.add('active');
  // Pause zoom interactions during crop
  document.getElementById('zoom-' + id).style.pointerEvents = 'none';
}

function exitCropMode(id) {
  document.getElementById('co-' + id).classList.remove('active');
  document.getElementById('ct-' + id).classList.remove('active');
  document.getElementById('zoom-' + id).style.pointerEvents = '';
}

// ── Corner handle dragging (Pointer Events) ──
document.querySelectorAll('.crop-handle').forEach(handle => {
  const corner  = handle.dataset.corner;
  const panelId = handle.dataset.panel;
  let startClientX, startClientY, startC;

  function dragStart(clientX, clientY) {
    startClientX = clientX;
    startClientY = clientY;
    startC = { ...cropState[panelId] };
  }

  function dragMove(clientX, clientY) {
    const panel = document.getElementById('panel-' + panelId);
    const pw = panel.clientWidth, ph = panel.clientHeight;
    const dx = (clientX - startClientX) / pw;
    const dy = (clientY - startClientY) / ph;
    const c  = cropState[panelId];
    const MIN = 0.08;

    if (corner === 'tl') {
      const nx = Math.max(0, Math.min(startC.x + dx, startC.x + startC.w - MIN));
      const ny = Math.max(0, Math.min(startC.y + dy, startC.y + startC.h - MIN));
      c.w = startC.w - (nx - startC.x);
      c.h = startC.h - (ny - startC.y);
      c.x = nx; c.y = ny;
    } else if (corner === 'tr') {
      const ny = Math.max(0, Math.min(startC.y + dy, startC.y + startC.h - MIN));
      c.h = startC.h - (ny - startC.y);
      c.y = ny;
      c.w = Math.max(MIN, Math.min(startC.w + dx, 1 - startC.x));
    } else if (corner === 'bl') {
      const nx = Math.max(0, Math.min(startC.x + dx, startC.x + startC.w - MIN));
      c.w = startC.w - (nx - startC.x);
      c.x = nx;
      c.h = Math.max(MIN, Math.min(startC.h + dy, 1 - startC.y));
    } else { // br
      c.w = Math.max(MIN, Math.min(startC.w + dx, 1 - startC.x));
      c.h = Math.max(MIN, Math.min(startC.h + dy, 1 - startC.y));
    }
    updateCropBox(panelId);
  }

  // Pointer Events — works for both touch and mouse
  handle.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    handle.setPointerCapture(e.pointerId);
    dragStart(e.clientX, e.clientY);
  }, { passive: false });

  handle.addEventListener('pointermove', e => {
    if (!handle.hasPointerCapture(e.pointerId)) return;
    e.preventDefault();
    dragMove(e.clientX, e.clientY);
  }, { passive: false });
});

// ── Apply crop using canvas (correct object-fit:cover math) ──
function applyCrop(id) {
  const panel = document.getElementById('panel-' + id);
  const img   = document.getElementById('img-' + id);
  const c = cropState[id];
  const s = state[id];
  const pw = panel.clientWidth, ph = panel.clientHeight;

  // Crop box in panel pixels
  const cropX = c.x * pw, cropY = c.y * ph;
  const cropW = c.w * pw, cropH = c.h * ph;

  // object-fit:cover scale from natural size → panel size
  const natW = img.naturalWidth, natH = img.naturalHeight;
  const cs = Math.max(pw / natW, ph / natH);

  // Where the rendered image sits inside the element before zoom transform
  // (can be negative — image overflows the element bounds)
  const ox = (pw - natW * cs) / 2;
  const oy = (ph - natH * cs) / 2;

  // Map panel pixel → source image pixel:
  //   element coords:  ex = (panelX - tx) / scale
  //   source coords:   srcX = (ex - ox) / cs
  const srcX = ((cropX - s.tx) / s.scale - ox) / cs;
  const srcY = ((cropY - s.ty) / s.scale - oy) / cs;
  const srcW = cropW / (s.scale * cs);
  const srcH = cropH / (s.scale * cs);

  // Clamp to image bounds
  const x0 = Math.max(0, Math.round(srcX));
  const y0 = Math.max(0, Math.round(srcY));
  const x1 = Math.min(natW, Math.round(srcX + srcW));
  const y1 = Math.min(natH, Math.round(srcY + srcH));

  const canvas = document.createElement('canvas');
  canvas.width  = x1 - x0;
  canvas.height = y1 - y0;
  canvas.getContext('2d').drawImage(img, x0, y0, canvas.width, canvas.height,
                                         0,  0, canvas.width, canvas.height);

  img.src = canvas.toDataURL('image/jpeg', 0.95);
  zoomReset(id);
  exitCropMode(id);
}

// ═══════════════════════════════════════════════════
// LAYOUT TOGGLE
// ═══════════════════════════════════════════════════

function setLayout(mode) {
  document.getElementById('photo-container').className =
    mode === 'side' ? 'layout-side' : 'layout-stacked';
  document.getElementById('btn-stacked').classList.toggle('active', mode === 'stacked');
  document.getElementById('btn-side').classList.toggle('active', mode === 'side');
}

// ═══════════════════════════════════════════════════
// HIDE / SHOW PANEL CONTROLS
// ═══════════════════════════════════════════════════

function toggleUI() {
  const hidden = document.body.classList.toggle('ui-hidden');
  const btn = document.getElementById('btn-hideui');
  btn.classList.toggle('active', hidden);
  // Swap icon: eye-off when hidden, eye when visible
  btn.innerHTML = hidden
    ? `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
         <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
         <line x1="3" y1="3" x2="13" y2="13"/>
       </svg>`
    : `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
         <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
         <circle cx="8" cy="8" r="2"/>
       </svg>`;
}

// ═══════════════════════════════════════════════════
// DOWNLOAD COMPARISON IMAGE
// ═══════════════════════════════════════════════════

function downloadComparison() {
  const container = document.getElementById('photo-container');
  const isSide    = container.classList.contains('layout-side');
  const cw = container.clientWidth, ch = container.clientHeight;

  const canvas = document.createElement('canvas');
  // 2× for sharper output on high-DPI screens
  const DPR = Math.min(window.devicePixelRatio || 1, 3);
  canvas.width  = cw * DPR;
  canvas.height = ch * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, cw, ch);

  const ids = ['before', 'after'];

  ids.forEach((id, i) => {
    const img = document.getElementById('img-' + id);
    if (!img || !img.naturalWidth) return;

    const panel = document.getElementById('panel-' + id);
    const pw = panel.clientWidth, ph = panel.clientHeight;
    const s  = state[id];
    const natW = img.naturalWidth, natH = img.naturalHeight;

    // object-fit:cover math (same as applyCrop)
    const cs = Math.max(pw / natW, ph / natH);
    const ox = (pw - natW * cs) / 2;
    const oy = (ph - natH * cs) / 2;

    // Source rectangle: what's currently visible in the panel
    const srcX = Math.max(0, ((0  - s.tx) / s.scale - ox) / cs);
    const srcY = Math.max(0, ((0  - s.ty) / s.scale - oy) / cs);
    const srcW = Math.min(pw / (s.scale * cs), natW - srcX);
    const srcH = Math.min(ph / (s.scale * cs), natH - srcY);

    // Destination rectangle on the output canvas
    let dstX, dstY, dstW, dstH;
    if (isSide) {
      dstX = i === 0 ? 0 : cw / 2; dstY = 0;
      dstW = cw / 2; dstH = ch;
    } else {
      dstX = 0; dstY = i === 0 ? 0 : ch / 2;
      dstW = cw; dstH = ch / 2;
    }

    // Clip to destination rect before drawing (prevents overflow)
    ctx.save();
    ctx.beginPath();
    ctx.rect(dstX, dstY, dstW, dstH);
    ctx.clip();
    ctx.drawImage(img, srcX, srcY, srcW, srcH, dstX, dstY, dstW, dstH);
    ctx.restore();

    // Label pill
    const labelText = id.toUpperCase();
    const bgColor   = id === 'before' ? '#e85d3a' : '#3ab88a';
    ctx.font = 'bold 11px "DM Mono", monospace';
    const tw = ctx.measureText(labelText).width;
    const lw = tw + 22, lh = 24, lx = dstX + 10, ly = dstY + 10, lr = 12;
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(lx, ly, lw, lh, lr);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(labelText, lx + 11, ly + lh / 2);
  });

  // Divider line
  ctx.fillStyle = '#000';
  if (isSide) ctx.fillRect(cw / 2, 0, 1, ch);
  else        ctx.fillRect(0, ch / 2, cw, 1);

  // Trigger download
  const a = document.createElement('a');
  a.download = 'before-after.jpg';
  a.href = canvas.toDataURL('image/jpeg', 0.93);
  a.click();
}
</script>
