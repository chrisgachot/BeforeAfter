<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Before & After">
<meta name="theme-color" content="#0f0f0f">
<title>Before & After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; height: 100dvh;
    overflow: hidden;
    background: #0f0f0f;
  }
  body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Toolbar ── */
  #toolbar {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 8px 0 6px;
    background: #0f0f0f;
    gap: 6px;
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
  }
  .toggle-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .toggle-btn.active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* ── Container ── */
  #photo-container {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #photo-container.layout-stacked { flex-direction: column; }
  #photo-container.layout-side    { flex-direction: row; }

  /* ── Panel ── */
  .panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
    min-width: 0;
    min-height: 0;
  }
  .layout-stacked .panel--before { border-bottom: 1px solid #000; }
  .layout-side    .panel--before { border-right:  1px solid #000; }

  /* ── Label ── */
  .label {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 20;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    pointer-events: none;
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .panel--before .label { background: #e85d3a; color: #fff; }
  .panel--after  .label { background: #3ab88a; color: #fff; }
  .layout-side .label { font-size: 9px; padding: 4px 8px; letter-spacing: 0.10em; }

  /* ── Zoom + Crop controls ── */
  .zoom-controls {
    position: absolute;
    bottom: 10px; right: 10px;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-controls.visible { display: flex; }
  .zoom-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 18px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'DM Mono', monospace;
    user-select: none;
  }
  .zoom-btn:active { background: rgba(255,255,255,0.15); }

  /* ── Crop button ── */
  .crop-btn-wrap {
    position: absolute;
    bottom: 10px; left: 10px;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 4px;
  }
  .crop-btn-wrap.visible { display: flex; }
  .crop-btn {
    height: 30px;
    padding: 0 10px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'DM Mono', monospace;
    user-select: none;
    white-space: nowrap;
  }
  .crop-btn:active { background: rgba(255,255,255,0.15); }
  .crop-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* ── Crop mode overlay ── */
  .crop-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    display: none;
  }
  .crop-overlay.active { display: block; }
  /* dim outside crop box */
  .crop-shade {
    position: absolute;
    background: rgba(0,0,0,0.45);
    pointer-events: none;
  }
  /* crop box border */
  .crop-box {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.85);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    pointer-events: none;
  }
  /* corner handles */
  .crop-handle {
    position: absolute;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 3px;
    pointer-events: all;
    cursor: pointer;
    touch-action: none;
  }
  .crop-handle.tl { top: -2px; left: -2px; cursor: nwse-resize; }
  .crop-handle.tr { top: -2px; right: -2px; cursor: nesw-resize; }
  .crop-handle.bl { bottom: -2px; left: -2px; cursor: nesw-resize; }
  .crop-handle.br { bottom: -2px; right: -2px; cursor: nwse-resize; }

  /* ── Crop toolbar ── */
  .crop-toolbar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    display: none;
    gap: 6px;
  }
  .crop-toolbar.active { display: flex; }
  .ct-btn {
    height: 32px;
    padding: 0 14px;
    border-radius: 20px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ct-btn.cancel { background: rgba(255,255,255,0.12); color: #aaa; }
  .ct-btn.apply  { background: #fff; color: #000; font-weight: 600; }
  .ct-btn:active { opacity: 0.75; }

  /* ── Empty state ── */
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    user-select: none;
    opacity: 0.22;
  }
  .empty svg { width: 34px; height: 34px; }
  .empty-text { font-size: 11px; color: #fff; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }

  /* ── Upload trigger ── */
  .upload-trigger {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .upload-trigger input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
  }
  .upload-trigger.hidden { display: none; }

  /* ── Zoomable image wrapper ── */
  .zoom-wrapper {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: none;
    touch-action: none;
  }
  .zoom-wrapper.visible { display: block; }
  .zoom-wrapper img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform-origin: 0 0;
    will-change: transform;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="toolbar">
  <button class="toggle-btn active" id="btn-stacked" onclick="setLayout('stacked')">
    <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="1" y="1" width="11" height="5" rx="1"/>
      <rect x="1" y="7" width="11" height="5" rx="1"/>
    </svg>
    Top / Bottom
  </button>
  <button class="toggle-btn" id="btn-side" onclick="setLayout('side')">
    <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="1" y="1" width="5" height="11" rx="1"/>
      <rect x="7" y="1" width="5" height="11" rx="1"/>
    </svg>
    Side by Side
  </button>
</div>

<div id="photo-container" class="layout-stacked">

  <!-- BEFORE -->
  <div class="panel panel--before" id="panel-before">
    <div class="label">Before</div>
    <div class="empty" id="empty-before">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-before">
      <input type="file" accept="image/*" id="input-before">
    </div>
    <div class="zoom-wrapper" id="zoom-before">
      <img id="img-before" alt="Before">
    </div>
    <div class="zoom-controls" id="zc-before">
      <button class="zoom-btn" onclick="zoomStep('before', 0.3)">+</button>
      <button class="zoom-btn" onclick="zoomStep('before', -0.3)">−</button>
      <button class="zoom-btn" style="font-size:13px" onclick="zoomReset('before')">↺</button>
    </div>
    <!-- Crop button (bottom-left) -->
    <div class="crop-btn-wrap" id="cb-before">
      <button class="crop-btn" onclick="enterCropMode('before')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M3 1v8h8M1 3h8v8"/>
        </svg>
        Crop
      </button>
    </div>
    <!-- Crop overlay -->
    <div class="crop-overlay" id="co-before">
      <div class="crop-box" id="cbox-before">
        <div class="crop-handle tl" data-corner="tl" data-panel="before"></div>
        <div class="crop-handle tr" data-corner="tr" data-panel="before"></div>
        <div class="crop-handle bl" data-corner="bl" data-panel="before"></div>
        <div class="crop-handle br" data-corner="br" data-panel="before"></div>
      </div>
    </div>
    <div class="crop-toolbar" id="ct-before">
      <button class="ct-btn cancel" onclick="exitCropMode('before')">Cancel</button>
      <button class="ct-btn apply"  onclick="applyCrop('before')">Apply Crop</button>
    </div>
  </div>

  <!-- AFTER -->
  <div class="panel panel--after" id="panel-after">
    <div class="label">After</div>
    <div class="empty" id="empty-after">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-after">
      <input type="file" accept="image/*" id="input-after">
    </div>
    <div class="zoom-wrapper" id="zoom-after">
      <img id="img-after" alt="After">
    </div>
    <div class="zoom-controls" id="zc-after">
      <button class="zoom-btn" onclick="zoomStep('after', 0.3)">+</button>
      <button class="zoom-btn" onclick="zoomStep('after', -0.3)">−</button>
      <button class="zoom-btn" style="font-size:13px" onclick="zoomReset('after')">↺</button>
    </div>
    <!-- Crop button (bottom-left) -->
    <div class="crop-btn-wrap" id="cb-after">
      <button class="crop-btn" onclick="enterCropMode('after')">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3">
          <path d="M3 1v8h8M1 3h8v8"/>
        </svg>
        Crop
      </button>
    </div>
    <!-- Crop overlay -->
    <div class="crop-overlay" id="co-after">
      <div class="crop-box" id="cbox-after">
        <div class="crop-handle tl" data-corner="tl" data-panel="after"></div>
        <div class="crop-handle tr" data-corner="tr" data-panel="after"></div>
        <div class="crop-handle bl" data-corner="bl" data-panel="after"></div>
        <div class="crop-handle br" data-corner="br" data-panel="after"></div>
      </div>
    </div>
    <div class="crop-toolbar" id="ct-after">
      <button class="ct-btn cancel" onclick="exitCropMode('after')">Cancel</button>
      <button class="ct-btn apply"  onclick="applyCrop('after')">Apply Crop</button>
    </div>
  </div>

</div>

<script>
// ── Zoom state ──
const state = {
  before: { scale: 1, tx: 0, ty: 0 },
  after:  { scale: 1, tx: 0, ty: 0 }
};

// ── Crop state (panel coords, % of panel) ──
const cropState = {
  before: { x: 0.1, y: 0.1, w: 0.8, h: 0.8 },
  after:  { x: 0.1, y: 0.1, w: 0.8, h: 0.8 }
};

// ── Apply zoom transform ──
function applyTransform(id) {
  const { scale, tx, ty } = state[id];
  document.getElementById('img-' + id).style.transform =
    `translate(${tx}px, ${ty}px) scale(${scale})`;
}

// ── Clamp pan ──
function clamp(id) {
  const s = state[id];
  const wrapper = document.getElementById('zoom-' + id);
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  s.tx = Math.min(0, Math.max(w - w * s.scale, s.tx));
  s.ty = Math.min(0, Math.max(h - h * s.scale, s.ty));
}

// ── Zoom step ──
function zoomStep(id, delta) {
  const s = state[id];
  const wrapper = document.getElementById('zoom-' + id);
  const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
  const newScale = Math.max(1, Math.min(6, s.scale + delta));
  const ratio = newScale / s.scale;
  s.tx = cx - ratio * (cx - s.tx);
  s.ty = cy - ratio * (cy - s.ty);
  s.scale = newScale;
  clamp(id);
  applyTransform(id);
}

// ── Zoom reset ──
function zoomReset(id) {
  state[id] = { scale: 1, tx: 0, ty: 0 };
  applyTransform(id);
}

// ── Pinch / pan handler ──
function attachZoom(id) {
  const wrapper = document.getElementById('zoom-' + id);
  const s = state[id];
  let lastDist = null, lastMidX = null, lastMidY = null;

  wrapper.addEventListener('touchstart', e => {
    e.preventDefault();
    const ts = Array.from(e.touches);
    if (ts.length === 2) {
      lastDist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);
      lastMidX = (ts[0].clientX + ts[1].clientX) / 2;
      lastMidY = (ts[0].clientY + ts[1].clientY) / 2;
    } else if (ts.length === 1) {
      lastMidX = ts[0].clientX; lastMidY = ts[0].clientY; lastDist = null;
    }
  }, { passive: false });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const ts = Array.from(e.touches);
    const rect = wrapper.getBoundingClientRect();
    if (ts.length === 2) {
      const dist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);
      const midX = (ts[0].clientX + ts[1].clientX) / 2 - rect.left;
      const midY = (ts[0].clientY + ts[1].clientY) / 2 - rect.top;
      if (lastDist !== null) {
        const ratio = dist / lastDist;
        const newScale = Math.max(1, Math.min(6, s.scale * ratio));
        const scaleRatio = newScale / s.scale;
        s.tx = midX - scaleRatio * (midX - s.tx);
        s.ty = midY - scaleRatio * (midY - s.ty);
        s.scale = newScale;
        if (lastMidX !== null) { s.tx += midX - lastMidX; s.ty += midY - lastMidY; }
      }
      lastDist = dist; lastMidX = midX; lastMidY = midY;
    } else if (ts.length === 1 && s.scale > 1) {
      const cx = ts[0].clientX - rect.left, cy = ts[0].clientY - rect.top;
      if (lastMidX !== null) { s.tx += cx - lastMidX; s.ty += cy - lastMidY; }
      lastMidX = cx; lastMidY = cy;
    }
    clamp(id); applyTransform(id);
  }, { passive: false });

  wrapper.addEventListener('touchend', e => {
    const ts = Array.from(e.touches);
    if (ts.length < 2) lastDist = null;
    if (ts.length === 1) { lastMidX = ts[0].clientX; lastMidY = ts[0].clientY; }
    if (ts.length === 0) { lastMidX = null; lastMidY = null; }
  }, { passive: false });

  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrapper.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    const newScale = Math.max(1, Math.min(6, s.scale + delta));
    const ratio = newScale / s.scale;
    s.tx = mx - ratio * (mx - s.tx);
    s.ty = my - ratio * (my - s.ty);
    s.scale = newScale;
    clamp(id); applyTransform(id);
  }, { passive: false });
}

// ── Upload ──
function setupUpload(id) {
  document.getElementById('input-' + id).addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById('img-' + id);
    img.src = url;
    document.getElementById('zoom-' + id).classList.add('visible');
    document.getElementById('zc-' + id).classList.add('visible');
    document.getElementById('cb-' + id).classList.add('visible');
    document.getElementById('empty-' + id).style.display = 'none';
    document.getElementById('trigger-' + id).classList.add('hidden');
    zoomReset(id);
  });
}

setupUpload('before'); setupUpload('after');
attachZoom('before');  attachZoom('after');

// ─────────────────────────────────────────
// ── CROP MODE ──
// ─────────────────────────────────────────

function enterCropMode(id) {
  // Reset crop box to a centered inset
  cropState[id] = { x: 0.1, y: 0.1, w: 0.8, h: 0.8 };
  updateCropBox(id);
  document.getElementById('co-' + id).classList.add('active');
  document.getElementById('ct-' + id).classList.add('active');
  // Disable zoom wrapper touch during crop
  document.getElementById('zoom-' + id).style.pointerEvents = 'none';
}

function exitCropMode(id) {
  document.getElementById('co-' + id).classList.remove('active');
  document.getElementById('ct-' + id).classList.remove('active');
  document.getElementById('zoom-' + id).style.pointerEvents = '';
}

function updateCropBox(id) {
  const panel  = document.getElementById('panel-' + id);
  const box    = document.getElementById('cbox-' + id);
  const c      = cropState[id];
  const pw     = panel.clientWidth;
  const ph     = panel.clientHeight;
  box.style.left   = (c.x * pw) + 'px';
  box.style.top    = (c.y * ph) + 'px';
  box.style.width  = (c.w * pw) + 'px';
  box.style.height = (c.h * ph) + 'px';
}

// Handle dragging of crop corners
(function attachCropHandles() {
  document.querySelectorAll('.crop-handle').forEach(handle => {
    const corner = handle.dataset.corner;
    const panelId = handle.dataset.panel;
    let startX, startY, startC;

    function onStart(clientX, clientY) {
      startX = clientX; startY = clientY;
      startC = { ...cropState[panelId] };
    }
    function onMove(clientX, clientY) {
      const panel = document.getElementById('panel-' + panelId);
      const pw = panel.clientWidth, ph = panel.clientHeight;
      const dx = (clientX - startX) / pw;
      const dy = (clientY - startY) / ph;
      const c = cropState[panelId];
      const MIN = 0.1;

      if (corner === 'tl') {
        c.x = Math.max(0, Math.min(startC.x + dx, startC.x + startC.w - MIN));
        c.y = Math.max(0, Math.min(startC.y + dy, startC.y + startC.h - MIN));
        c.w = startC.w - (c.x - startC.x);
        c.h = startC.h - (c.y - startC.y);
      } else if (corner === 'tr') {
        c.y = Math.max(0, Math.min(startC.y + dy, startC.y + startC.h - MIN));
        c.w = Math.max(MIN, Math.min(startC.w + dx, 1 - startC.x));
        c.h = startC.h - (c.y - startC.y);
      } else if (corner === 'bl') {
        c.x = Math.max(0, Math.min(startC.x + dx, startC.x + startC.w - MIN));
        c.w = startC.w - (c.x - startC.x);
        c.h = Math.max(MIN, Math.min(startC.h + dy, 1 - startC.y));
      } else if (corner === 'br') {
        c.w = Math.max(MIN, Math.min(startC.w + dx, 1 - startC.x));
        c.h = Math.max(MIN, Math.min(startC.h + dy, 1 - startC.y));
      }
      updateCropBox(panelId);
    }

    // Touch
    handle.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      const t = e.touches[0];
      onStart(t.clientX, t.clientY);
    }, { passive: false });
    handle.addEventListener('touchmove', e => {
      e.preventDefault(); e.stopPropagation();
      const t = e.touches[0];
      onMove(t.clientX, t.clientY);
    }, { passive: false });

    // Mouse
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      onStart(e.clientX, e.clientY);
      function onMM(ev) { onMove(ev.clientX, ev.clientY); }
      function onMU()   { document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', onMU); }
      document.addEventListener('mousemove', onMM);
      document.addEventListener('mouseup',   onMU);
    });
  });
})();

// ── Apply crop using canvas ──
function applyCrop(id) {
  const panel   = document.getElementById('panel-' + id);
  const img     = document.getElementById('img-' + id);
  const c       = cropState[id];
  const s       = state[id];
  const pw      = panel.clientWidth;
  const ph      = panel.clientHeight;

  // Crop box in panel pixels
  const cropX = c.x * pw;
  const cropY = c.y * ph;
  const cropW = c.w * pw;
  const cropH = c.h * ph;

  // Map panel pixels → image source pixels
  // The image is rendered as: transform = translate(tx,ty) scale(scale)
  // covering the full panel (object-fit: cover)
  // Natural image size
  const natW = img.naturalWidth;
  const natH = img.naturalHeight;

  // Cover scale: the CSS scale that makes the image fill the panel
  const coverScale = Math.max(pw / natW, ph / natH);

  // Rendered image size (before zoom transform)
  const rendW = natW * coverScale;
  const rendH = natH * coverScale;

  // Offset to center the covered image (object-fit: cover aligns center)
  const offX = (pw - rendW) / 2;
  const offY = (ph - rendH) / 2;

  // Total transform: image pixel at panel position (px, py) is:
  //   imgX = (px - tx - offX) / (coverScale * scale)
  //   imgY = (py - ty - offY) / (coverScale * scale)
  const totalScale = coverScale * s.scale;

  const srcX = (cropX - s.tx - offX) / totalScale;
  const srcY = (cropY - s.ty - offY) / totalScale;
  const srcW = cropW / totalScale;
  const srcH = cropH / totalScale;

  // Clamp to image bounds
  const clampedSrcX = Math.max(0, srcX);
  const clampedSrcY = Math.max(0, srcY);
  const clampedSrcW = Math.min(srcW, natW - clampedSrcX);
  const clampedSrcH = Math.min(srcH, natH - clampedSrcY);

  // Draw onto canvas
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(clampedSrcW);
  canvas.height = Math.round(clampedSrcH);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, clampedSrcX, clampedSrcY, clampedSrcW, clampedSrcH,
                     0, 0, canvas.width, canvas.height);

  img.src = canvas.toDataURL('image/jpeg', 0.95);
  zoomReset(id);
  exitCropMode(id);
}

// ── Layout toggle ──
function setLayout(mode) {
  document.getElementById('photo-container').className =
    mode === 'side' ? 'layout-side' : 'layout-stacked';
  document.getElementById('btn-stacked').classList.toggle('active', mode === 'stacked');
  document.getElementById('btn-side').classList.toggle('active', mode === 'side');
}
</script>
