<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Before & After">
<meta name="theme-color" content="#0f0f0f">
<title>Before & After</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%; height: 100dvh;
    overflow: hidden;
    background: #0f0f0f;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Toolbar ── */
  #toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 6px;
    background: #0f0f0f;
    touch-action: manipulation;
  }
  #toolbar-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
  }
  .toggle-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .toggle-btn.active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* ── Share button ── */
  #btn-share {
    width: 32px; height: 32px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
  }
  #btn-share svg { width: 14px; height: 14px; }
  #btn-share:active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* ── Fit / Fill toggle ── */
  #btn-fit {
    width: 32px; height: 32px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
    margin-right: 4px;
  }
  #btn-fit svg { width: 14px; height: 14px; }
  #btn-fit.active { background: #1e1e1e; border-color: #444; color: #ccc; }

  /* Fit mode: contain instead of cover, panel bg shows as letterbox bars */
  body.fit-mode .zoom-wrapper img { object-fit: contain; }

  /* ── Options bar ── */
  #options-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 7px;
    background: #0f0f0f;
    gap: 8px;
    touch-action: manipulation;
  }
  #code-input {
    flex: 1;
    height: 28px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    color: #ccc;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 12px;
    outline: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    min-width: 0;
  }
  #code-input::placeholder { color: #444; }
  #code-input:focus { border-color: #444; }
  #sep-btns {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }
  .sep-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.18s;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .sep-btn svg { width: 12px; height: 12px; }
  #sep-black { background: #111; }
  #sep-white { background: #333; }
  .sep-btn.active { outline: 2px solid #666; outline-offset: 1px; }

  /* ── Property code preview label ── */
  #code-preview {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    display: none;
  }
  #code-preview.visible { display: block; }

  /* ── Separator live preview ── */
  .layout-stacked .panel--before { border-bottom: 1px solid #111; }
  .layout-side    .panel--before { border-right:  1px solid #111; }
  body.sep-black .layout-stacked .panel--before { border-bottom: 6px solid #000; }
  body.sep-black .layout-side    .panel--before { border-right:  6px solid #000; }
  body.sep-white .layout-stacked .panel--before { border-bottom: 6px solid #fff; }
  body.sep-white .layout-side    .panel--before { border-right:  6px solid #fff; }

  /* ── Container ── */
  #photo-container {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #photo-container.layout-stacked { flex-direction: column; }
  #photo-container.layout-side    { flex-direction: row; }

  /* ── Panel ── */
  .panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
    min-width: 0;
    min-height: 0;
  }
  /* ── Label ── */
  .label {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 20;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    pointer-events: none;
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .panel--before .label { background: #e85d3a; color: #fff; }
  .panel--after  .label { background: #3ab88a; color: #fff; }
  .layout-side .label { font-size: 9px; padding: 4px 8px; letter-spacing: 0.10em; }

  /* ── Empty state ── */
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0.22;
  }
  .empty svg { width: 34px; height: 34px; }
  .empty-text {
    font-size: 11px; color: #fff;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* ── Upload trigger ── */
  .upload-trigger {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .upload-trigger input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
  }
  .upload-trigger.hidden { display: none; }

  /* ── Zoomable image wrapper ── */
  .zoom-wrapper {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: none;
    touch-action: none;
  }
  .zoom-wrapper.visible { display: block; }
  .zoom-wrapper img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform-origin: 0 0;
    will-change: transform;
    pointer-events: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div id="toolbar-left">
    <button class="toggle-btn" id="btn-stacked" onclick="setLayout('stacked')">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="11" height="5" rx="1"/>
        <rect x="1" y="7" width="11" height="5" rx="1"/>
      </svg>
      Top / Bottom
    </button>
    <button class="toggle-btn active" id="btn-side" onclick="setLayout('side')">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="5" height="11" rx="1"/>
        <rect x="7" y="1" width="5" height="11" rx="1"/>
      </svg>
      Side by Side
    </button>
  </div>
  <!-- Fit / Fill toggle -->
  <button id="btn-fit" onclick="toggleFit()" title="Fit image (preserve aspect ratio)">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="1" y="1" width="12" height="12" rx="1.5"/>
      <rect x="3.5" y="4" width="7" height="5.5" rx="0.5"/>
    </svg>
  </button>
  <!-- iOS share icon (box with arrow up) -->
  <button id="btn-share" onclick="shareComparison()" title="Share">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 1v9M5 4l3-3 3 3"/>
      <path d="M4 7H2v8h12V7h-2"/>
    </svg>
  </button>
</div>

<div id="options-bar">
  <input type="text" id="code-input" placeholder="Property code…" maxlength="20"
         autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
  <div id="sep-btns">
    <!-- Black separator -->
    <button class="sep-btn" id="sep-black" onclick="setSep('black')" title="Black separator">
      <svg viewBox="0 0 12 12" fill="none">
        <rect x="0" y="5" width="12" height="2" fill="#000"/>
      </svg>
    </button>
    <!-- White separator -->
    <button class="sep-btn" id="sep-white" onclick="setSep('white')" title="White separator">
      <svg viewBox="0 0 12 12" fill="none">
        <rect x="0" y="5" width="12" height="2" fill="#fff"/>
      </svg>
    </button>
  </div>
</div>

<div id="photo-container" class="layout-side" style="position:relative">
  <div id="code-preview"></div>

  <!-- BEFORE -->
  <div class="panel panel--before" id="panel-before">
    <div class="label">Before</div>
    <div class="empty" id="empty-before">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-before">
      <input type="file" accept="image/*" id="input-before">
    </div>
    <div class="zoom-wrapper" id="zoom-before">
      <img id="img-before" alt="Before">
    </div>
  </div>

  <!-- AFTER -->
  <div class="panel panel--after" id="panel-after">
    <div class="label">After</div>
    <div class="empty" id="empty-after">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span class="empty-text">tap to add photo</span>
    </div>
    <div class="upload-trigger" id="trigger-after">
      <input type="file" accept="image/*" id="input-after">
    </div>
    <div class="zoom-wrapper" id="zoom-after">
      <img id="img-after" alt="After">
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// PREVENT BROWSER-LEVEL PAGE ZOOM
// ═══════════════════════════════════════════════════

// Safari gesture events
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });

// Block ALL touchmove at document level — most reliable way to stop
// Android Chrome page zoom (which ignores user-scalable=no since Chrome 55)
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Block multi-touch touchstart (extra safety for iOS)
document.addEventListener('touchstart', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// Prevent double-tap zoom
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });

// Desktop ctrl+scroll zoom
document.addEventListener('wheel', e => {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });

// ═══════════════════════════════════════════════════
// ZOOM STATE
// ═══════════════════════════════════════════════════

const state = {
  before: { scale: 1, tx: 0, ty: 0 },
  after:  { scale: 1, tx: 0, ty: 0 }
};

function applyTransform(id) {
  const { scale, tx, ty } = state[id];
  document.getElementById('img-' + id).style.transform =
    `translate(${tx}px,${ty}px) scale(${scale})`;
}

function clampState(id) {
  const s = state[id];
  const wrapper = document.getElementById('zoom-' + id);
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  s.tx = Math.min(0, Math.max(w - w * s.scale, s.tx));
  s.ty = Math.min(0, Math.max(h - h * s.scale, s.ty));
}

function zoomToward(id, px, py, newScale) {
  const s = state[id];
  newScale = Math.max(1, Math.min(8, newScale));
  const ratio = newScale / s.scale;
  s.tx = px - ratio * (px - s.tx);
  s.ty = py - ratio * (py - s.ty);
  s.scale = newScale;
  clampState(id);
  applyTransform(id);
}

function zoomReset(id) {
  state[id] = { scale: 1, tx: 0, ty: 0 };
  applyTransform(id);
}

// ═══════════════════════════════════════════════════
// PINCH-TO-ZOOM + PAN  (Touch Events)
// ═══════════════════════════════════════════════════

function attachZoom(id) {
  const wrapper = document.getElementById('zoom-' + id);
  let lastMidX = null, lastMidY = null, lastDist = null;

  wrapper.addEventListener('touchstart', e => {
    e.preventDefault();
    const ts = Array.from(e.touches);
    const rect = wrapper.getBoundingClientRect();
    if (ts.length >= 2) {
      lastMidX = (ts[0].clientX + ts[1].clientX) / 2 - rect.left;
      lastMidY = (ts[0].clientY + ts[1].clientY) / 2 - rect.top;
      lastDist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);
    } else {
      lastMidX = ts[0].clientX - rect.left;
      lastMidY = ts[0].clientY - rect.top;
      lastDist = null;
    }
  }, { passive: false });

  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const ts = Array.from(e.touches);
    const rect = wrapper.getBoundingClientRect();
    const s = state[id];

    if (ts.length >= 2) {
      const midX = (ts[0].clientX + ts[1].clientX) / 2 - rect.left;
      const midY = (ts[0].clientY + ts[1].clientY) / 2 - rect.top;
      const dist = Math.hypot(ts[1].clientX - ts[0].clientX, ts[1].clientY - ts[0].clientY);

      if (lastDist !== null && lastMidX !== null) {
        const newScale = Math.max(1, Math.min(8, s.scale * (dist / lastDist)));
        const ar = newScale / s.scale;
        s.tx = midX - ar * (midX - s.tx);
        s.ty = midY - ar * (midY - s.ty);
        s.scale = newScale;
        s.tx += midX - lastMidX;
        s.ty += midY - lastMidY;
      }
      lastMidX = midX; lastMidY = midY; lastDist = dist;

    } else if (ts.length === 1) {
      const cx = ts[0].clientX - rect.left;
      const cy = ts[0].clientY - rect.top;
      if (lastMidX !== null) { s.tx += cx - lastMidX; s.ty += cy - lastMidY; }
      lastMidX = cx; lastMidY = cy; lastDist = null;
    }

    clampState(id);
    applyTransform(id);
  }, { passive: false });

  wrapper.addEventListener('touchend', e => {
    const ts = Array.from(e.touches);
    const rect = wrapper.getBoundingClientRect();
    if (ts.length === 0) {
      lastMidX = null; lastMidY = null; lastDist = null;
    } else if (ts.length === 1) {
      lastMidX = ts[0].clientX - rect.left;
      lastMidY = ts[0].clientY - rect.top;
      lastDist = null;
    }
  }, { passive: false });

  wrapper.addEventListener('touchcancel', () => {
    lastMidX = null; lastMidY = null; lastDist = null;
  });

  // Mouse drag (desktop)
  let dragging = false, dragX, dragY;
  wrapper.addEventListener('mousedown', e => {
    dragging = true; dragX = e.clientX; dragY = e.clientY; e.preventDefault();
  });
  wrapper.addEventListener('mousemove', e => {
    if (!dragging) return;
    const s = state[id];
    s.tx += e.clientX - dragX; s.ty += e.clientY - dragY;
    dragX = e.clientX; dragY = e.clientY;
    clampState(id); applyTransform(id);
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // Mouse-wheel zoom (desktop)
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrapper.getBoundingClientRect();
    zoomToward(id, e.clientX - rect.left, e.clientY - rect.top,
               state[id].scale + (e.deltaY > 0 ? -0.15 : 0.15));
  }, { passive: false });
}

// ═══════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════

function setupUpload(id) {
  document.getElementById('input-' + id).addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('img-' + id).src = URL.createObjectURL(file);
    document.getElementById('zoom-' + id).classList.add('visible');
    document.getElementById('empty-' + id).style.display = 'none';
    document.getElementById('trigger-' + id).classList.add('hidden');
    zoomReset(id);
  });
}

setupUpload('before'); setupUpload('after');
attachZoom('before');  attachZoom('after');

// ═══════════════════════════════════════════════════
// LAYOUT TOGGLE
// ═══════════════════════════════════════════════════

function setLayout(mode) {
  document.getElementById('photo-container').className =
    mode === 'side' ? 'layout-side' : 'layout-stacked';
  document.getElementById('btn-stacked').classList.toggle('active', mode === 'stacked');
  document.getElementById('btn-side').classList.toggle('active', mode === 'side');
}

// ═══════════════════════════════════════════════════
// SEPARATOR TOGGLE
// ═══════════════════════════════════════════════════

let sepColor = 'none'; // 'none' | 'black' | 'white'

function setSep(color) {
  if (sepColor === color) {
    // Tap active button → turn off
    sepColor = 'none';
    document.body.classList.remove('sep-black', 'sep-white');
    document.getElementById('sep-black').classList.remove('active');
    document.getElementById('sep-white').classList.remove('active');
  } else {
    sepColor = color;
    document.body.classList.toggle('sep-black', color === 'black');
    document.body.classList.toggle('sep-white', color === 'white');
    document.getElementById('sep-black').classList.toggle('active', color === 'black');
    document.getElementById('sep-white').classList.toggle('active', color === 'white');
  }
}

// ═══════════════════════════════════════════════════
// FIT / FILL TOGGLE
// ═══════════════════════════════════════════════════

function toggleFit() {
  const isFit = document.body.classList.toggle('fit-mode');
  document.getElementById('btn-fit').classList.toggle('active', isFit);
  // Reset zoom so the image recentres cleanly in the new mode
  zoomReset('before');
  zoomReset('after');
}

// ═══════════════════════════════════════════════════
// SHARE / SAVE TO PHOTOS
// ═══════════════════════════════════════════════════

function shareComparison() {
  const container = document.getElementById('photo-container');
  const isSide = container.classList.contains('layout-side');
  const cw = container.clientWidth, ch = container.clientHeight;

  const canvas = document.createElement('canvas');
  const DPR = Math.min(window.devicePixelRatio || 1, 3);
  canvas.width  = cw * DPR;
  canvas.height = ch * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, cw, ch);

  const isFit = document.body.classList.contains('fit-mode');

  ['before', 'after'].forEach((id, i) => {
    const img = document.getElementById('img-' + id);
    if (!img || !img.naturalWidth) return;

    const panel = document.getElementById('panel-' + id);
    const pw = panel.clientWidth, ph = panel.clientHeight;
    const s  = state[id];
    const natW = img.naturalWidth, natH = img.naturalHeight;

    // Destination: use actual panel clientWidth/clientHeight so any
    // separator border offset is automatically accounted for.
    const dstX = (isSide && i === 1) ? cw - pw : 0;
    const dstY = (!isSide && i === 1) ? ch - ph : 0;
    const dstW = pw, dstH = ph;

    ctx.save();
    // Clip to this panel's area
    ctx.beginPath();
    ctx.rect(dstX, dstY, dstW, dstH);
    ctx.clip();

    if (isFit) {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(dstX, dstY, dstW, dstH);
    }

    // ── Replicate the CSS rendering exactly ──
    // CSS does: transform-origin:0 0; transform:translate(tx,ty) scale(s)
    // on an element that uses object-fit:[cover|contain] to display the image.
    // We mirror that sequence directly on the canvas context so there is
    // no inverse-transform math and no rounding drift.
    const cs = isFit
      ? Math.min(pw / natW, ph / natH)   // contain
      : Math.max(pw / natW, ph / natH);  // cover
    const ox = (pw - natW * cs) / 2;     // image offset inside element
    const oy = (ph - natH * cs) / 2;

    ctx.translate(dstX, dstY);           // move into this panel's region
    ctx.translate(s.tx, s.ty);           // same translation CSS applies
    ctx.scale(s.scale, s.scale);         // same zoom CSS applies
    ctx.drawImage(img,                   // draw image at its object-fit position
      ox, oy, natW * cs, natH * cs);

    ctx.restore();

    // Label pill
    const bgColor = id === 'before' ? '#e85d3a' : '#3ab88a';
    ctx.font = 'bold 11px "DM Mono", monospace';
    const tw = ctx.measureText(id.toUpperCase()).width;
    const lw = tw + 22, lh = 24, lx = dstX + 10, ly = dstY + 10;
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(lx, ly, lw, lh, 12);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(id.toUpperCase(), lx + 11, ly + lh / 2);
  });

  // ── Separator line ──
  const SEP_W  = sepColor === 'none' ? 1 : 6;
  const SEP_COL = sepColor === 'white' ? '#fff' : '#000';
  ctx.fillStyle = SEP_COL;
  // Separator sits between the two panels; find the gap by looking at where
  // the after-panel actually starts in the canvas.
  const afterPanel = document.getElementById('panel-after');
  const afterRect  = afterPanel.getBoundingClientRect();
  const containerRect = document.getElementById('photo-container').getBoundingClientRect();
  const sepPos = isSide
    ? Math.round(afterRect.left - containerRect.left - SEP_W / 2)
    : Math.round(afterRect.top  - containerRect.top  - SEP_W / 2);
  if (isSide) ctx.fillRect(sepPos, 0, SEP_W, ch);
  else        ctx.fillRect(0, sepPos, cw, SEP_W);

  // ── Property code label ──
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (code) {
    ctx.font = 'bold 13px "DM Mono", monospace';
    const tw  = ctx.measureText(code).width;
    const lw  = tw + 28, lh = 28, lr = 14;
    const lx  = (cw - lw) / 2, ly = ch - lh - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.beginPath();
    ctx.roundRect(lx, ly, lw, lh, lr);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.fillText(code, lx + 14, ly + lh / 2);
  }

  // iOS: share sheet → Save Image → Photos
  // Desktop: fallback to file download
  canvas.toBlob(blob => {
    const file = new File([blob], 'before-after.jpg', { type: 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'Before & After' }).catch(() => {});
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = 'before-after.jpg';
      a.href = url;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }
  }, 'image/jpeg', 0.93);
}
</script>
</body>
</html>
